<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Real-time IoT Weather Dashboard monitoring temperature and humidity." />
  <title>Live Weather Dashboard</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="styles.css">

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

    // --- Firebase Configuration ---
    const firebaseConfig = {
      apiKey: "AIzaSyAQmL_8cxdWiC920C-GnrV6GS4S_wBV5y0",
      authDomain: "esp32-weather-dashboard.firebaseapp.com",
      databaseURL: "https://esp32-weather-dashboard-default-rtdb.firebaseio.com",
      projectId: "esp32-weather-dashboard",
      storageBucket: "esp32-weather-dashboard.firebasestorage.app",
      messagingSenderId: "846543764599",
      appId: "1:846543764599:web:de34bec4b89969043cda72"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const TEMP_ID = "temp-value";
    const HUM_ID  = "hum-value";
    const TIME_ID = "time-stamp";
    
    const tempRef = ref(db, "DHT/temperature");
    const humRef  = ref(db, "DHT/humidity");
    const tsRef   = ref(db, "DHT/lastUpdated");

    function setText(id, text) {
      const el = document.getElementById(id);
      if (el) el.textContent = text;
    }

    function formatTime(ms) {
      if (!ms && ms !== 0) return "--";
      const d = new Date(ms);
      return d.toLocaleString(undefined, {
        month: 'short', day: 'numeric',
        hour: '2-digit', minute:'2-digit', second:'2-digit'
      });
    }

    async function start() {
      try {
        await signInAnonymously(auth);
        console.log("Firebase Authenticated Anonymously.");
        
        // Hide error message on successful auth
        document.getElementById("error-msg").style.display = "none";

        onValue(tempRef, (snap) => {
          const val = snap.val();
          setText(TEMP_ID, (val ?? "--") + (val != null ? "°C" : "")); 
        }, (error) => console.error("Temperature listener error:", error));

        onValue(humRef, (snap) => {
          const val = snap.val();
          setText(HUM_ID, (val ?? "--") + (val != null ? "%" : ""));
        }, (error) => console.error("Humidity listener error:", error));

        onValue(tsRef, (snap) => {
          const val = snap.val();
          if (val !== null) {
            setText(TIME_ID, formatTime(val));
          } else {
             setText(TIME_ID, "--");
          }
        }, (error) => console.error("Timestamp listener error:", error));
      } catch (error) {
        console.error("Authentication or Initialization failed:", error);
        document.getElementById("error-msg").textContent = "Connection Error: Check console and Firebase configuration.";
        document.getElementById("error-msg").style.display = "block";
      }
    }

    start();
  </script>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  
  <div class="dashboard-wrapper">
    <div id="error-msg"></div>
    
    <main class="glass-panel">
      <header class="header-container">
        <h1 class="header-title">
          <svg class="header-icon" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v2"/><path d="M12 20v2"/><path d="M4.93 4.93l1.41 1.41"/><path d="M17.66 17.66l1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="M4.93 19.07l1.41-1.41"/><path d="M17.66 6.34l1.41-1.41"/><circle cx="12" cy="12" r="7"/></svg>
          IoT Weather Station
        </h1>
        <p class="header-subtitle">Real-time telemetry via NodeMCU & Firebase</p>
      </header>

      <section class="cards-grid">
        <!-- Temperature Card -->
        <article class="metric-card temp">
          <div class="metric-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/></svg>
          </div>
          <div class="metric-label">Temperature</div>
          <div class="metric-value" id="temp-value">--</div>
        </article>

        <!-- Humidity Card -->
        <article class="metric-card hum">
          <div class="metric-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22a4 4 0 0 0 4-4V6a4 4 0 0 0-8 0v12a4 4 0 0 0 4 4z"/></svg>
          </div>
          <div class="metric-label">Humidity</div>
          <div class="metric-value" id="hum-value">--</div>
        </article>
      </section>
      
      <footer class="footer-info">
        <div class="timestamp" title="Live updates">
          <span class="pulse-dot"></span>
          <span>Last updated: <span id="time-stamp">--</span></span>
        </div>
      </footer>
    </main>
  </div>
</body>
</html>
